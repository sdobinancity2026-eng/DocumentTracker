<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDO Biñan City Document Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons8-tracking-64.png" type="image/jpg">
    <link rel="apple-touch-icon" href="icons8-tracking-64.png">

    <style>
      body, html { 
        margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
        background: #003366; 
      }
      
      #splash-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: url('SdoBuilding.png'); 
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        color: white;
        display: flex; flex-direction: column; 
        align-items: center; justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
        font-family: sans-serif;
      }

      #splash-screen::before {
        content: "";
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 51, 102, 0.65);
        z-index: -1;
      }

      .btn-container { display: flex; gap: 20px; margin-top: 20px; }
      
      .role-btn {
        padding: 15px 30px;
        background: rgba(255, 255, 255, 0.2);
        border: 2px solid white;
        color: white;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        border-radius: 8px;
        transition: background 0.3s;
      }
      .role-btn:hover { background: rgba(255, 255, 255, 0.4); }

      iframe { width: 100%; height: 100%; border: none; }
    </style>
  </head>
  <body>

    <div id="splash-screen">
      <div style="text-align: center; display: flex; flex-direction: column; align-items: center; gap: 15px;">
        <h1>SDO Biñan City</h1>
        <p>Document Tracker</p>
        
        <div class="btn-container">
          <button class="role-btn" onclick="launchApp('https://script.google.com/macros/s/AKfycbzlaFr5e7wmz9oNQex1l253CiDUtuoUjm6pPUU5Mz_74FaJSkfOY8-hRbG3KYHCWG2i/exec')">ENTER AS CLIENT</button>
          <button class="role-btn" onclick="launchApp('https://script.google.com/macros/s/AKfycbzlaFr5e7wmz9oNQex1l253CiDUtuoUjm6pPUU5Mz_74FaJSkfOY8-hRbG3KYHCWG2i/exec?page=admin')">ENTER AS ADMIN</button>
        </div>

        <button id="installBtn" style="display: none; margin-top: 20px; padding: 10px 20px; background: #38bdf8; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px;">
          INSTALL APP
        </button>
      </div>
    </div>

    <iframe id="appFrame" src="" allow="geolocation; camera; microphone" allowfullscreen="true"></iframe>

    <script>
      let deferredPrompt;

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installBtn').style.display = 'block';
      });

      document.getElementById('installBtn').addEventListener('click', () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then((choiceResult) => {
            if (choiceResult.outcome === 'accepted') document.getElementById('installBtn').style.display = 'none';
            deferredPrompt = null;
          });
        }
      });

      function launchApp(url) {
        const splash = document.getElementById("splash-screen");
        const frame = document.getElementById("appFrame");
        
        // Set the frame source to the chosen URL
        frame.src = url;
        
        // Hide Splash
        splash.style.opacity = '0';
        setTimeout(() => { splash.style.display = 'none'; }, 500);
        
        // Request Fullscreen
        document.documentElement.requestFullscreen().catch((err) => {
          console.warn(`Fullscreen skipped: ${err.message}`);
        });
      }
    </script>
  </body>
</html>
